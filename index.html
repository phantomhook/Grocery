<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f6f3; color: #1a1a1a; font-size: 16px; -webkit-font-smoothing: antialiased; }

  /* ── Tabs ── */
  .tabs { display: flex; background: #1d5e3a; position: sticky; top: 0; z-index: 20; }
  .tab { flex: 1; text-align: center; padding: 12px 0 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.03em; color: rgba(255,255,255,0.5); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: #fff; border-bottom-color: rgba(255,255,255,0.8); }
  .tab:active { background: rgba(255,255,255,0.05); }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Hero header ── */
  .hero { background: linear-gradient(135deg, #2a7a4f 0%, #1d5e3a 100%); color: #fff; padding: 1.25rem 1.25rem 1.15rem; }
  .hero-row { display: flex; align-items: center; gap: 10px; }
  .hero-edit { background: rgba(255,255,255,0.15); border: none; color: rgba(255,255,255,0.8); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .hero-edit:active { background: rgba(255,255,255,0.25); }
  .hero-edit svg { width: 14px; height: 14px; }
  .title-block { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .trip-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .title-sep { color: rgba(255,255,255,0.3); font-weight: 300; font-size: 18px; }
  .trip-date { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 400; }
  .quick-add { display: flex; gap: 8px; margin-top: 12px; }
  .quick-add input { flex: 1; border: none; border-radius: 10px; padding: 10px 14px; font-size: 15px; font-family: inherit; background: rgba(255,255,255,0.15); color: #fff; outline: none; }
  .quick-add input::placeholder { color: rgba(255,255,255,0.4); }
  .quick-add input:focus { background: rgba(255,255,255,0.22); }
  .quick-add-btn { background: rgba(255,255,255,0.9); color: #1d5e3a; border: none; border-radius: 10px; padding: 0 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .quick-add-btn:active { background: #fff; }
  .quick-add-section { position: relative; }
  .quick-add-section select { appearance: none; -webkit-appearance: none; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border: none; border-radius: 10px; padding: 10px 28px 10px 12px; font-size: 13px; font-family: inherit; cursor: pointer; outline: none; }
  .quick-add-section select option { color: #1a1a1a; background: #fff; }
  .quick-add-section::after { content: '\25BE'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 12px; pointer-events: none; }
  .progress-wrap { margin-top: 12px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .progress-fill { height: 4px; background: rgba(255,255,255,0.85); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; }

  /* ── Meta edit panel ── */
  .meta-edit { background: #fff; border-bottom: 1px solid #e8e7e3; padding: 1rem 1.25rem; display: none; }
  .meta-edit.open { display: block; }
  .meta-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .meta-row input { flex: 1; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; transition: border-color 0.15s; }
  .meta-row input:focus { outline: none; border-color: #2a7a4f; }
  .meta-save { font-size: 13px; background: #2a7a4f; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-weight: 500; }

  /* ── Notes ── */
  .notes-area { background: #fff; border-bottom: 1px solid #e8e7e3; padding: 0.85rem 1.25rem; display: none; }
  .notes-area.open { display: block; }
  .notes-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .notes-input { width: 100%; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; resize: vertical; min-height: 70px; }
  .notes-input:focus { outline: none; border-color: #2a7a4f; }

  /* ── Content ── */
  .content { padding: 0.25rem 0 5rem; }
  .section { margin-bottom: 2px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0.65rem 1.25rem 0.45rem; background: #f0efeb; }
  .section-left { display: flex; align-items: center; gap: 8px; }
  .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }
  .section-count { font-size: 10px; color: #bbb; font-weight: 500; }
  .section-remove { font-size: 14px; color: #ccc; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
  .section-remove:active { color: #e55; }
  .add-item-btn { font-size: 12px; color: #2a7a4f; background: none; border: none; cursor: pointer; padding: 2px 0; font-weight: 500; }

  /* ── Items ── */
  .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 1.25rem; background: #fff; border-bottom: 1px solid #f0efeb; }
  .cb { width: 20px; height: 20px; border: 2px solid #d0cfc9; border-radius: 6px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cb:active { transform: scale(0.9); }
  .cb.checked { background: #2a7a4f; border-color: #2a7a4f; }
  .cb.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(40deg) translate(-1px, -1px); }
  .item-qty-badge { min-width: 42px; padding: 3px 7px; background: #eef7f1; color: #2a7a4f; font-size: 11px; font-weight: 700; border-radius: 5px; text-align: center; flex-shrink: 0; margin-top: 1px; line-height: 1.3; }
  .item-qty-badge.empty { background: #f5f4f0; color: #ccc; }
  .item-row.done-row .item-qty-badge { background: #f5f4f0; color: #c5c4bf; }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; color: #1a1a1a; line-height: 1.4; transition: color 0.15s; }
  .item-name.done { text-decoration: line-through; color: #c5c4bf; }
  .item-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
  .item-recipe { font-size: 11px; color: #7ab0e0; margin-top: 1px; font-weight: 500; }
  .item-actions { display: flex; gap: 2px; flex-shrink: 0; margin-top: -1px; }
  .item-act { width: 28px; height: 28px; border-radius: 6px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #ccc; transition: all 0.12s; }
  .item-act:active { background: #f0efeb; }
  .item-act.edit-act:active { color: #2a7a4f; }
  .item-act.del-act:active { color: #e55; }
  .item-act svg { width: 14px; height: 14px; }

  /* ── Inline edit ── */
  .item-edit-row { background: #fafaf8; border-bottom: 1px solid #f0efeb; padding: 10px 1.25rem; display: none; gap: 6px; flex-direction: column; }
  .item-edit-row.open { display: flex; }
  .item-edit-row input { border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fff; width: 100%; }
  .item-edit-row input:focus { outline: none; border-color: #2a7a4f; }
  .edit-fields-row { display: flex; gap: 6px; }
  .edit-fields-row input { flex: 1; }
  .edit-actions { display: flex; gap: 6px; justify-content: flex-end; }

  /* ── Add item form ── */
  .add-form { display: none; background: #fff; border-bottom: 1px solid #f0efeb; padding: 10px 1.25rem; gap: 6px; flex-direction: column; }
  .add-form.open { display: flex; }
  .add-form input { border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; width: 100%; }
  .add-form input:focus { outline: none; border-color: #2a7a4f; }
  .add-form-row { display: flex; gap: 6px; }
  .add-form-row input { flex: 1; }
  .add-form-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-cancel { font-size: 13px; background: none; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 7px 14px; cursor: pointer; color: #777; }
  .btn-add { font-size: 13px; background: #2a7a4f; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-weight: 500; }

  /* ── Add section ── */
  .add-section-bar { padding: 12px 1.25rem; }
  .add-section-bar.collapsed .add-section-form { display: none; }
  .add-section-btn { font-size: 13px; color: #2a7a4f; background: none; border: 2px dashed #d5d4ce; border-radius: 10px; padding: 12px; width: 100%; cursor: pointer; font-weight: 500; }
  .add-section-btn:active { background: #f0efeb; border-color: #2a7a4f; }
  .add-section-form { display: flex; gap: 6px; }
  .add-section-form input { flex: 1; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; }
  .add-section-form input:focus { outline: none; border-color: #2a7a4f; }
  .add-section-form .btn-add, .add-section-form .btn-cancel { flex-shrink: 0; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 3rem 2rem; color: #bbb; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: #999; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; color: #bbb; }

  /* ── New list creation ── */
  .new-list-prompt { background: #fff; padding: 2rem 1.25rem; text-align: center; }
  .new-list-prompt h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .new-list-prompt p { font-size: 13px; color: #999; margin-bottom: 20px; }
  .new-list-form { max-width: 400px; margin: 0 auto; }
  .new-list-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .new-list-row input { flex: 1; border: 1.5px solid #e0dfdb; border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; color: #1a1a1a; background: #fafaf8; }
  .new-list-row input:focus { outline: none; border-color: #2a7a4f; }
  .new-list-go { width: 100%; background: #2a7a4f; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .new-list-go:active { background: #1d5e3a; }

  /* ── Bottom bar ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8e7e3; padding: 0.65rem 1.25rem; display: flex; gap: 8px; z-index: 15; }
  .bar-btn { flex: 1; font-size: 13px; font-weight: 500; background: none; border: 1.5px solid #e0dfdb; border-radius: 10px; padding: 10px; cursor: pointer; color: #777; transition: all 0.15s; }
  .bar-btn:active { background: #f0efeb; }
  .bar-btn.accent { border-color: #2a7a4f; color: #2a7a4f; }
  .bar-btn.danger { border-color: #e0dfdb; color: #c44; }

  /* ── History view ── */
  .history-header { background: linear-gradient(135deg, #2a7a4f 0%, #1d5e3a 100%); color: #fff; padding: 1.25rem; }
  .history-header h2 { font-size: 20px; font-weight: 700; }
  .history-header p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }
  .history-list { padding: 0.5rem 0 5rem; }
  .history-empty { text-align: center; padding: 3rem 2rem; color: #bbb; }
  .history-empty-icon { font-size: 42px; margin-bottom: 10px; opacity: 0.35; }
  .history-empty-title { font-size: 15px; font-weight: 600; color: #999; margin-bottom: 4px; }
  .history-empty-sub { font-size: 13px; }
  .history-card { background: #fff; margin: 0 0 1px; padding: 14px 1.25rem; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: background 0.1s; }
  .history-card:active { background: #fafaf8; }
  .history-card:first-child { border-top: 1px solid #f0efeb; }
  .history-badge { width: 40px; height: 40px; border-radius: 10px; background: #eef7f1; color: #2a7a4f; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .history-info { flex: 1; min-width: 0; }
  .history-title { font-size: 15px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-date { font-size: 12px; color: #aaa; margin-top: 2px; }
  .history-stats { font-size: 11px; color: #bbb; margin-top: 1px; }
  .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .history-action-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid #e8e7e3; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 14px; transition: all 0.15s; }
  .history-action-btn:active { background: #f0efeb; }
  .history-action-btn.delete:active { color: #e55; border-color: #e55; }
  .history-action-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('current')">Current List</div>
  <div class="tab" onclick="switchTab('history')">History</div>
</div>

<!-- ══════ CURRENT LIST VIEW ══════ -->
<div class="view active" id="viewCurrent">

  <div class="hero" id="heroBar" style="display:none">
    <div class="hero-row">
      <button class="hero-edit" onclick="toggleMeta()" title="Edit">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>
      </button>
      <div class="title-block">
        <div class="trip-title" id="tripTitle"></div>
        <span class="title-sep" id="titleSep">/</span>
        <div class="trip-date" id="tripDate"></div>
      </div>
    </div>
    <div class="quick-add">
      <input type="text" id="quickQty" placeholder="Qty" style="flex:0 0 60px">
      <input type="text" id="quickName" placeholder="Item name...">
      <div class="quick-add-section"><select id="quickSection"></select></div>
      <button class="quick-add-btn" onclick="quickAdd()">Add</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">No items yet</div>
    </div>
  </div>

  <div class="meta-edit" id="metaEdit">
    <div class="meta-row">
      <input type="text" id="titleInput" placeholder="List name">
      <input type="text" id="dateInput" placeholder="Date">
    </div>
    <button class="meta-save" onclick="saveMeta()">Save</button>
  </div>

  <div class="notes-area" id="notesArea">
    <div class="notes-label">Notes</div>
    <textarea class="notes-input" id="notesInput" placeholder="Meal ideas, store preferences, dietary notes..."></textarea>
  </div>

  <!-- New list prompt (shown when no active list) -->
  <div id="newListPrompt" style="display:none">
    <div class="new-list-prompt">
      <h2>Start a new list</h2>
      <p>Name your trip, set the date, and start adding items.</p>
      <div class="new-list-form">
        <div class="new-list-row">
          <input type="text" id="newTitle" placeholder="e.g. Johnsville Trip">
          <input type="text" id="newDate" placeholder="e.g. June 15">
        </div>
        <button class="new-list-go" onclick="createList()">Create list</button>
      </div>
    </div>
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-bar" id="bottomBar" style="display:none">
    <button class="bar-btn" onclick="resetAll()">Uncheck</button>
    <button class="bar-btn accent" onclick="toggleNotes()">Notes</button>
    <button class="bar-btn danger" onclick="archiveAndNew()">New list</button>
  </div>
</div>

<!-- ══════ HISTORY VIEW ══════ -->
<div class="view" id="viewHistory">
  <div class="history-header">
    <h2>Past Lists</h2>
    <p id="historyCount"></p>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
const DEFAULT_SECTIONS = [
  { id: 'produce', label: 'Produce', items: [] },
  { id: 'dairy', label: 'Dairy & Eggs', items: [] },
  { id: 'meat', label: 'Meat & Seafood', items: [] },
  { id: 'bread', label: 'Bread & Bakery', items: [] },
  { id: 'pantry', label: 'Pantry & Dry Goods', items: [] },
  { id: 'frozen', label: 'Frozen', items: [] },
  { id: 'beverages', label: 'Beverages', items: [] },
  { id: 'other', label: 'Other', items: [] },
];

// ── State ──
let currentList = null; // { id, title, date, notes, sections, checked, createdAt }
let history = [];

function uid() { return '_' + Math.random().toString(36).substr(2, 9); }
function todayStr() {
  const d = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function save() {
  localStorage.setItem('grocery_current', JSON.stringify(currentList));
  localStorage.setItem('grocery_history', JSON.stringify(history));
}

function load() {
  const c = localStorage.getItem('grocery_current');
  const h = localStorage.getItem('grocery_history');
  if (c) {
    currentList = JSON.parse(c);
    if (currentList && !currentList.date) { currentList.date = todayStr(); }
  }
  if (h) history = JSON.parse(h);
  // migrate old single-list format
  if (!currentList && !h) {
    const oldSec = localStorage.getItem('grocery_sections');
    if (oldSec) {
      currentList = {
        id: uid(),
        title: localStorage.getItem('grocery_title') || 'Grocery List',
        date: localStorage.getItem('grocery_date') || todayStr(),
        notes: localStorage.getItem('grocery_notes') || '',
        sections: JSON.parse(oldSec),
        checked: JSON.parse(localStorage.getItem('grocery_checked') || '{}'),
        createdAt: new Date().toISOString(),
      };
      // clean up old keys
      ['grocery_sections','grocery_checked','grocery_title','grocery_date','grocery_notes'].forEach(k => localStorage.removeItem(k));
      save();
    }
  }
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'current') || (i === 1 && tab === 'history'));
  });
  document.getElementById('viewCurrent').classList.toggle('active', tab === 'current');
  document.getElementById('viewHistory').classList.toggle('active', tab === 'history');
  if (tab === 'history') renderHistory();
}

// ── Current list view ──
function showCurrentView() {
  if (!currentList) {
    document.getElementById('heroBar').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('newListPrompt').style.display = '';
    document.getElementById('content').innerHTML = '';
    // Pre-fill date with today
    document.getElementById('newDate').value = todayStr();
    document.getElementById('newTitle').focus();
    return;
  }
  document.getElementById('newListPrompt').style.display = 'none';
  document.getElementById('heroBar').style.display = '';
  document.getElementById('bottomBar').style.display = '';
  document.getElementById('tripTitle').textContent = currentList.title;
  document.getElementById('tripDate').textContent = currentList.date;
  document.getElementById('titleSep').style.display = currentList.date ? '' : 'none';
  document.getElementById('titleInput').value = currentList.title;
  document.getElementById('dateInput').value = currentList.date;
  document.getElementById('notesInput').value = currentList.notes || '';
  render();
}

function createList() {
  const title = document.getElementById('newTitle').value.trim();
  const date = document.getElementById('newDate').value.trim() || todayStr();
  if (!title) { document.getElementById('newTitle').focus(); return; }
  currentList = {
    id: uid(),
    title,
    date,
    notes: '',
    sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    checked: {},
    createdAt: new Date().toISOString(),
  };
  save();
  showCurrentView();
}

function render() {
  if (!currentList) return;
  const sections = currentList.sections;
  const checked = currentList.checked;
  const container = document.getElementById('content');
  container.innerHTML = '';
  const totalItems = sections.reduce((sum, s) => sum + s.items.length, 0);

  if (totalItems === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-icon">🛒</div>
      <div class="empty-title">Your list is empty</div>
      <div class="empty-sub">Type above to start adding items</div>
    `;
    container.appendChild(empty);
  }

  sections.forEach(section => {
    if (totalItems === 0 && section.items.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    const checkedCount = section.items.filter(i => checked[i.id]).length;
    const countLabel = section.items.length > 0 ? `${checkedCount}/${section.items.length}` : '';
    hdr.innerHTML = `
      <div class="section-left">
        <span class="section-label">${section.label}</span>
        <span class="section-count">${countLabel}</span>
        <button class="section-remove" onclick="removeSection('${section.id}')">&times;</button>
      </div>
      <button class="add-item-btn" onclick="toggleAddForm('${section.id}')">+ Add</button>`;
    sec.appendChild(hdr);
    section.items.forEach((item, idx) => {
      if (!item.id) item.id = uid();
      const done = !!checked[item.id];
      const row = document.createElement('div');
      row.className = `item-row${done ? ' done-row' : ''}`;
      row.innerHTML = `
        <div class="cb ${done ? 'checked' : ''}" onclick="toggleCheck('${item.id}', this)"></div>
        <div class="item-qty-badge ${item.qty ? '' : 'empty'}">${item.qty || '--'}</div>
        <div class="item-body">
          <div class="item-name ${done ? 'done' : ''}">${item.name}</div>
          ${item.note ? `<div class="item-meta">${item.note}</div>` : ''}
          ${item.recipe ? `<div class="item-recipe">${item.recipe}</div>` : ''}
        </div>
        <div class="item-actions">
          <button class="item-act edit-act" onclick="toggleEditItem('${section.id}', ${idx})" title="Edit">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>
          </button>
          <button class="item-act del-act" onclick="deleteItem('${section.id}', ${idx})" title="Delete">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M5.5 4V3a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1M6 7v5M10 7v5M4 4l.8 9a1 1 0 0 0 1 .9h4.4a1 1 0 0 0 1-.9L12 4"/></svg>
          </button>
        </div>
      `;
      sec.appendChild(row);
      // Inline edit form
      const editRow = document.createElement('div');
      editRow.className = 'item-edit-row';
      editRow.id = `edit-${section.id}-${idx}`;
      editRow.innerHTML = `
        <div class="edit-fields-row">
          <input type="text" placeholder="Qty" id="eq-${section.id}-${idx}" value="${(item.qty || '').replace(/"/g, '&quot;')}">
          <input type="text" placeholder="Item name" id="en-${section.id}-${idx}" value="${(item.name || '').replace(/"/g, '&quot;')}" style="flex:2">
        </div>
        <input type="text" placeholder="Note (optional)" id="eno-${section.id}-${idx}" value="${(item.note || '').replace(/"/g, '&quot;')}">
        <input type="text" placeholder="Recipe or tag (optional)" id="er-${section.id}-${idx}" value="${(item.recipe || '').replace(/"/g, '&quot;')}">
        <div class="edit-actions">
          <button class="btn-cancel" onclick="toggleEditItem('${section.id}', ${idx})">Cancel</button>
          <button class="btn-add" onclick="saveEditItem('${section.id}', ${idx})">Save</button>
        </div>
      `;
      sec.appendChild(editRow);
    });
    const form = document.createElement('div');
    form.className = 'add-form';
    form.id = `form-${section.id}`;
    form.innerHTML = `
      <div class="add-form-row">
        <input type="text" placeholder="Qty (optional)" id="qty-${section.id}">
        <input type="text" placeholder="Item name" id="name-${section.id}" style="flex:2">
      </div>
      <input type="text" placeholder="Note (optional)" id="note-${section.id}">
      <input type="text" placeholder="Recipe or tag (optional)" id="recipe-${section.id}">
      <div class="add-form-actions">
        <button class="btn-cancel" onclick="toggleAddForm('${section.id}')">Cancel</button>
        <button class="btn-add" onclick="addItem('${section.id}')">Add</button>
      </div>
    `;
    sec.appendChild(form);
    container.appendChild(sec);
  });

  const addBar = document.createElement('div');
  addBar.className = 'add-section-bar collapsed';
  addBar.id = 'addSectionBar';
  addBar.innerHTML = `
    <button class="add-section-btn" onclick="showAddSection()">+ Add section</button>
    <div class="add-section-form">
      <input type="text" id="newSectionName" placeholder="Section name (e.g. Snacks)">
      <button class="btn-add" onclick="addSection()">Add</button>
      <button class="btn-cancel" onclick="hideAddSection()">Cancel</button>
    </div>
  `;
  container.appendChild(addBar);
  populateQuickSection();
  updateProgress();
}

function populateQuickSection() {
  if (!currentList) return;
  const sel = document.getElementById('quickSection');
  sel.innerHTML = '';
  currentList.sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.label;
    sel.appendChild(opt);
  });
}

function quickAdd() {
  if (!currentList) return;
  const nameInp = document.getElementById('quickName');
  const qtyInp = document.getElementById('quickQty');
  const name = nameInp.value.trim();
  if (!name) return;
  const qty = qtyInp.value.trim();
  const sectionId = document.getElementById('quickSection').value;
  const section = currentList.sections.find(s => s.id === sectionId);
  if (!section) return;
  section.items.push({ id: uid(), qty, name, note: '', recipe: '' });
  nameInp.value = '';
  qtyInp.value = '';
  save();
  render();
}

function toggleCheck(itemId, el) {
  if (!currentList) return;
  currentList.checked[itemId] = !currentList.checked[itemId];
  el.classList.toggle('checked', currentList.checked[itemId]);
  const row = el.closest('.item-row');
  if (row) row.classList.toggle('done-row', currentList.checked[itemId]);
  const main = el.parentElement.querySelector('.item-name');
  if (main) main.classList.toggle('done', currentList.checked[itemId]);
  save();
  updateProgress();
  const sectionEl = el.closest('.section');
  if (sectionEl) {
    const countEl = sectionEl.querySelector('.section-count');
    if (countEl) {
      const total = sectionEl.querySelectorAll('.cb').length;
      const done = sectionEl.querySelectorAll('.cb.checked').length;
      countEl.textContent = `${done}/${total}`;
    }
  }
}

function deleteItem(sectionId, idx) {
  if (!currentList) return;
  const section = currentList.sections.find(s => s.id === sectionId);
  if (!section) return;
  const item = section.items[idx];
  if (item && item.id) delete currentList.checked[item.id];
  section.items.splice(idx, 1);
  save();
  render();
}

function toggleAddForm(sectionId) {
  const form = document.getElementById(`form-${sectionId}`);
  form.classList.toggle('open');
  if (form.classList.contains('open')) form.querySelector('input[id^="name-"]').focus();
}

function addItem(sectionId) {
  if (!currentList) return;
  const qty = document.getElementById(`qty-${sectionId}`).value.trim();
  const name = document.getElementById(`name-${sectionId}`).value.trim();
  const note = document.getElementById(`note-${sectionId}`).value.trim();
  const recipe = document.getElementById(`recipe-${sectionId}`).value.trim();
  if (!name) return;
  const section = currentList.sections.find(s => s.id === sectionId);
  if (!section) return;
  section.items.push({ id: uid(), qty: qty || '', name, note, recipe });
  save();
  render();
  const form = document.getElementById(`form-${sectionId}`);
  if (form) { form.classList.add('open'); form.querySelector('input[id^="name-"]').focus(); }
}

function toggleEditItem(sectionId, idx) {
  const el = document.getElementById(`edit-${sectionId}-${idx}`);
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    el.querySelector(`#en-${sectionId}-${idx}`).focus();
  }
}

function saveEditItem(sectionId, idx) {
  if (!currentList) return;
  const section = currentList.sections.find(s => s.id === sectionId);
  if (!section || !section.items[idx]) return;
  const name = document.getElementById(`en-${sectionId}-${idx}`).value.trim();
  if (!name) return;
  section.items[idx].qty = document.getElementById(`eq-${sectionId}-${idx}`).value.trim();
  section.items[idx].name = name;
  section.items[idx].note = document.getElementById(`eno-${sectionId}-${idx}`).value.trim();
  section.items[idx].recipe = document.getElementById(`er-${sectionId}-${idx}`).value.trim();
  save();
  render();
}

function showAddSection() {
  const bar = document.getElementById('addSectionBar');
  bar.classList.remove('collapsed');
  bar.querySelector('.add-section-btn').style.display = 'none';
  document.getElementById('newSectionName').focus();
}
function hideAddSection() {
  const bar = document.getElementById('addSectionBar');
  bar.classList.add('collapsed');
  bar.querySelector('.add-section-btn').style.display = '';
  document.getElementById('newSectionName').value = '';
}
function addSection() {
  if (!currentList) return;
  const name = document.getElementById('newSectionName').value.trim();
  if (!name) return;
  currentList.sections.push({ id: name.toLowerCase().replace(/[^a-z0-9]+/g, '_') + '_' + uid(), label: name, items: [] });
  save();
  render();
}
function removeSection(sectionId) {
  if (!currentList) return;
  const section = currentList.sections.find(s => s.id === sectionId);
  if (!section) return;
  const count = section.items.length;
  const msg = count > 0 ? `Remove "${section.label}" and its ${count} item${count > 1 ? 's' : ''}?` : `Remove "${section.label}"?`;
  if (!confirm(msg)) return;
  section.items.forEach(item => { if (item.id) delete currentList.checked[item.id]; });
  currentList.sections = currentList.sections.filter(s => s.id !== sectionId);
  save();
  render();
}

function resetAll() {
  if (!currentList || !confirm('Uncheck all items?')) return;
  currentList.checked = {};
  save();
  render();
}

function toggleNotes() {
  document.getElementById('notesArea').classList.toggle('open');
}
function toggleMeta() {
  const el = document.getElementById('metaEdit');
  el.classList.toggle('open');
  if (el.classList.contains('open')) document.getElementById('titleInput').focus();
}
function saveMeta() {
  if (!currentList) return;
  currentList.title = document.getElementById('titleInput').value.trim() || 'Grocery List';
  currentList.date = document.getElementById('dateInput').value.trim();
  document.getElementById('tripTitle').textContent = currentList.title;
  document.getElementById('tripDate').textContent = currentList.date;
  document.getElementById('titleSep').style.display = currentList.date ? '' : 'none';
  document.getElementById('metaEdit').classList.remove('open');
  save();
}

function updateProgress() {
  if (!currentList) return;
  let total = 0;
  currentList.sections.forEach(s => total += s.items.length);
  const done = Object.values(currentList.checked).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = total > 0 ? `${done} of ${total} items` : 'No items yet';
}

// ── Archive & new ──
function archiveCurrentList() {
  if (!currentList) return;
  // Save notes before archiving
  currentList.notes = document.getElementById('notesInput').value || '';
  const totalItems = currentList.sections.reduce((sum, s) => sum + s.items.length, 0);
  if (totalItems > 0) {
    history.unshift({ ...currentList, archivedAt: new Date().toISOString() });
  }
}

function archiveAndNew() {
  if (!confirm('Save this list to history and start a new one?')) return;
  archiveCurrentList();
  currentList = null;
  document.getElementById('notesArea').classList.remove('open');
  document.getElementById('metaEdit').classList.remove('open');
  save();
  showCurrentView();
}

// ── History view ──
function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  document.getElementById('historyCount').textContent = history.length > 0
    ? `${history.length} saved list${history.length > 1 ? 's' : ''}`
    : '';

  if (history.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="history-empty-icon">📋</div>
        <div class="history-empty-title">No past lists yet</div>
        <div class="history-empty-sub">Completed lists will appear here</div>
      </div>`;
    return;
  }

  history.forEach((list, idx) => {
    const totalItems = list.sections.reduce((sum, s) => sum + s.items.length, 0);
    const checkedItems = Object.values(list.checked).filter(Boolean).length;
    const card = document.createElement('div');
    card.className = 'history-card';
    card.onclick = (e) => { if (!e.target.closest('.history-action-btn')) viewHistoryList(idx); };
    card.innerHTML = `
      <div class="history-badge">${list.title.charAt(0).toUpperCase()}</div>
      <div class="history-info">
        <div class="history-title">${list.title}</div>
        <div class="history-date">${list.date || 'No date'}</div>
        <div class="history-stats">${checkedItems}/${totalItems} items checked</div>
      </div>
      <div class="history-actions">
        <button class="history-action-btn" onclick="restoreList(${idx})" title="Restore as current">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1 1 1.76 4.24"/><path d="M2 12V8h4"/></svg>
        </button>
        <button class="history-action-btn delete" onclick="deleteHistory(${idx})" title="Delete">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M5.5 4V3a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1M6 7v5M10 7v5M4 4l.8 9a1 1 0 0 0 1 .9h4.4a1 1 0 0 0 1-.9L12 4"/></svg>
        </button>
      </div>
    `;
    container.appendChild(card);
  });
}

function viewHistoryList(idx) {
  const list = history[idx];
  if (!list) return;
  let detail = `${list.title}`;
  if (list.date) detail += ` — ${list.date}`;
  const totalItems = list.sections.reduce((sum, s) => sum + s.items.length, 0);
  const checkedItems = Object.values(list.checked).filter(Boolean).length;
  detail += `\n${checkedItems}/${totalItems} items checked`;
  if (list.notes) detail += `\n\nNotes: ${list.notes}`;
  detail += '\n\nItems:\n';
  list.sections.forEach(s => {
    const items = s.items;
    if (items.length === 0) return;
    detail += `\n${s.label}:\n`;
    items.forEach(i => {
      const mark = list.checked[i.id] ? '✓' : '○';
      detail += `  ${mark} ${i.qty ? i.qty + ' ' : ''}${i.name}${i.note ? ' — ' + i.note : ''}\n`;
    });
  });
  alert(detail);
}

function restoreList(idx) {
  const list = history[idx];
  if (!list) return;
  if (currentList) {
    if (!confirm(`This will archive your current list and restore "${list.title}". Continue?`)) return;
    archiveCurrentList();
  }
  currentList = JSON.parse(JSON.stringify(list));
  history.splice(idx, 1);
  save();
  switchTab('current');
  showCurrentView();
}

function deleteHistory(idx) {
  const list = history[idx];
  if (!list || !confirm(`Delete "${list.title}" from history?`)) return;
  history.splice(idx, 1);
  save();
  renderHistory();
}

// ── Save notes on input ──
document.getElementById('notesInput').addEventListener('input', () => {
  if (currentList) { currentList.notes = document.getElementById('notesInput').value; save(); }
});

// ── Enter key on quick add & new list ──
document.getElementById('quickQty').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('quickName').focus(); });
document.getElementById('quickName').addEventListener('keydown', e => { if (e.key === 'Enter') quickAdd(); });
document.getElementById('newTitle').addEventListener('keydown', e => { if (e.key === 'Enter') { document.getElementById('newDate').focus(); } });
document.getElementById('newDate').addEventListener('keydown', e => { if (e.key === 'Enter') createList(); });

// ── Init ──
load();
showCurrentView();
</script>
</body>
</html>
