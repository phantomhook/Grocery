<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f6f3; color: #1a1a1a; font-size: 16px; -webkit-font-smoothing: antialiased; }

  /* ── Hero header ── */
  .hero { background: linear-gradient(135deg, #2a7a4f 0%, #1d5e3a 100%); color: #fff; padding: 1.5rem 1.25rem 1.25rem; position: sticky; top: 0; z-index: 10; }
  .hero-top { display: flex; align-items: flex-start; gap: 10px; }
  .hero-edit { background: rgba(255,255,255,0.15); border: none; color: rgba(255,255,255,0.8); font-size: 13px; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: background 0.15s; }
  .hero-edit:active { background: rgba(255,255,255,0.25); }
  .hero-edit svg { width: 14px; height: 14px; }
  .title-block { flex: 1; min-width: 0; }
  .trip-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .trip-date { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 3px; }
  .progress-wrap { margin-top: 14px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .progress-fill { height: 4px; background: rgba(255,255,255,0.85); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 5px; }

  /* ── Quick add (always visible in header) ── */
  .quick-add { display: flex; gap: 8px; margin-top: 14px; }
  .quick-add input { flex: 1; border: none; border-radius: 10px; padding: 10px 14px; font-size: 15px; font-family: inherit; background: rgba(255,255,255,0.15); color: #fff; outline: none; }
  .quick-add input::placeholder { color: rgba(255,255,255,0.45); }
  .quick-add input:focus { background: rgba(255,255,255,0.22); }
  .quick-add-btn { background: rgba(255,255,255,0.9); color: #1d5e3a; border: none; border-radius: 10px; padding: 0 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .quick-add-btn:active { background: #fff; }
  .quick-add-section { position: relative; }
  .quick-add-section select { appearance: none; -webkit-appearance: none; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border: none; border-radius: 10px; padding: 10px 28px 10px 12px; font-size: 13px; font-family: inherit; cursor: pointer; outline: none; }
  .quick-add-section select option { color: #1a1a1a; background: #fff; }
  .quick-add-section::after { content: '\25BE'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 12px; pointer-events: none; }

  /* ── Meta edit panel ── */
  .meta-edit { background: #fff; border-bottom: 1px solid #e8e7e3; padding: 1rem 1.25rem; display: none; }
  .meta-edit.open { display: block; }
  .meta-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .meta-row input { flex: 1; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; transition: border-color 0.15s; }
  .meta-row input:focus { outline: none; border-color: #2a7a4f; }
  .meta-actions { display: flex; gap: 8px; }
  .meta-save { font-size: 13px; background: #2a7a4f; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-weight: 500; }
  .meta-save:active { background: #1d5e3a; }

  /* ── Notes ── */
  .notes-area { background: #fff; border-bottom: 1px solid #e8e7e3; padding: 0.85rem 1.25rem; display: none; }
  .notes-area.open { display: block; }
  .notes-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .notes-input { width: 100%; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; resize: vertical; min-height: 70px; transition: border-color 0.15s; }
  .notes-input:focus { outline: none; border-color: #2a7a4f; }

  /* ── Content ── */
  .content { padding: 0.25rem 0 5rem; }
  .section { margin-bottom: 2px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0.65rem 1.25rem 0.45rem; background: #f0efeb; }
  .section-left { display: flex; align-items: center; gap: 8px; }
  .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }
  .section-count { font-size: 10px; color: #bbb; font-weight: 500; }
  .section-remove { font-size: 14px; color: #ccc; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
  .section-remove:active { color: #e55; }
  .section-actions { display: flex; align-items: center; gap: 10px; }
  .add-item-btn { font-size: 12px; color: #2a7a4f; background: none; border: none; cursor: pointer; padding: 2px 0; font-weight: 500; }

  /* ── Items ── */
  .item-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 1.25rem; background: #fff; border-bottom: 1px solid #f0efeb; transition: background 0.1s; }
  .item-row:active { background: #fafaf8; }
  .cb { width: 20px; height: 20px; border: 2px solid #d0cfc9; border-radius: 6px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cb:active { transform: scale(0.9); }
  .cb.checked { background: #2a7a4f; border-color: #2a7a4f; }
  .cb.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(40deg) translate(-1px, -1px); }
  .item-body { flex: 1; }
  .item-main { font-size: 15px; color: #1a1a1a; line-height: 1.4; transition: color 0.15s; }
  .item-main.done { text-decoration: line-through; color: #c5c4bf; }
  .item-qty { font-weight: 600; color: #2a7a4f; }
  .item-main.done .item-qty { color: #c5c4bf; }
  .item-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
  .item-recipe { font-size: 11px; color: #7ab0e0; margin-top: 1px; font-weight: 500; }
  .delete-btn { font-size: 18px; color: #ddd; background: none; border: none; cursor: pointer; padding: 0 0 0 4px; line-height: 1; flex-shrink: 0; transition: color 0.1s; }
  .delete-btn:active { color: #e55; }

  /* ── Add item form ── */
  .add-form { display: none; background: #fff; border-bottom: 1px solid #f0efeb; padding: 10px 1.25rem; gap: 6px; flex-direction: column; }
  .add-form.open { display: flex; }
  .add-form input { border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; width: 100%; transition: border-color 0.15s; }
  .add-form input:focus { outline: none; border-color: #2a7a4f; }
  .add-form-row { display: flex; gap: 6px; }
  .add-form-row input { flex: 1; }
  .add-form-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-cancel { font-size: 13px; background: none; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 7px 14px; cursor: pointer; color: #777; }
  .btn-add { font-size: 13px; background: #2a7a4f; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-weight: 500; }
  .btn-add:active { background: #1d5e3a; }

  /* ── Add section ── */
  .add-section-bar { padding: 12px 1.25rem; }
  .add-section-bar.collapsed .add-section-form { display: none; }
  .add-section-btn { font-size: 13px; color: #2a7a4f; background: none; border: 2px dashed #d5d4ce; border-radius: 10px; padding: 12px; width: 100%; cursor: pointer; font-weight: 500; transition: border-color 0.15s, background 0.15s; }
  .add-section-btn:active { background: #f0efeb; border-color: #2a7a4f; }
  .add-section-form { display: flex; gap: 6px; }
  .add-section-form input { flex: 1; border: 1.5px solid #e0dfdb; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; }
  .add-section-form input:focus { outline: none; border-color: #2a7a4f; }
  .add-section-form .btn-add { flex-shrink: 0; }
  .add-section-form .btn-cancel { flex-shrink: 0; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 3rem 2rem; color: #bbb; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: #999; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; color: #bbb; }

  /* ── Bottom bar ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8e7e3; padding: 0.65rem 1.25rem; display: flex; gap: 8px; }
  .bar-btn { flex: 1; font-size: 13px; font-weight: 500; background: none; border: 1.5px solid #e0dfdb; border-radius: 10px; padding: 10px; cursor: pointer; color: #777; transition: all 0.15s; }
  .bar-btn:active { background: #f0efeb; }
  .bar-btn.accent { border-color: #2a7a4f; color: #2a7a4f; }
  .bar-btn.danger { border-color: #e0dfdb; color: #c44; }
  .bar-btn.danger:active { border-color: #c44; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <button class="hero-edit" onclick="toggleMeta()" title="Edit list name & date">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/>
      </svg>
    </button>
    <div class="title-block">
      <div class="trip-title" id="tripTitle">Grocery List</div>
      <div class="trip-date" id="tripDate"></div>
    </div>
  </div>
  <div class="quick-add">
    <input type="text" id="quickName" placeholder="Add an item...">
    <div class="quick-add-section">
      <select id="quickSection"></select>
    </div>
    <button class="quick-add-btn" onclick="quickAdd()">Add</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">No items yet</div>
  </div>
</div>

<div class="meta-edit" id="metaEdit">
  <div class="meta-row">
    <input type="text" id="titleInput" placeholder="List name (e.g. Beach Weekend)">
    <input type="text" id="dateInput" placeholder="Date (e.g. June 15)">
  </div>
  <div class="meta-actions">
    <button class="meta-save" onclick="saveMeta()">Save</button>
  </div>
</div>

<div class="notes-area" id="notesArea">
  <div class="notes-label">Notes</div>
  <textarea class="notes-input" id="notesInput" placeholder="Meal ideas, store preferences, dietary notes..."></textarea>
</div>

<div class="content" id="content"></div>

<div class="bottom-bar">
  <button class="bar-btn" onclick="resetAll()">Uncheck all</button>
  <button class="bar-btn accent" onclick="toggleNotes()">Notes</button>
  <button class="bar-btn danger" onclick="newList()">New list</button>
</div>

<script>
const defaultSections = [
  { id: 'produce', label: 'Produce', items: [] },
  { id: 'dairy', label: 'Dairy & Eggs', items: [] },
  { id: 'meat', label: 'Meat & Seafood', items: [] },
  { id: 'bread', label: 'Bread & Bakery', items: [] },
  { id: 'pantry', label: 'Pantry & Dry Goods', items: [] },
  { id: 'frozen', label: 'Frozen', items: [] },
  { id: 'beverages', label: 'Beverages', items: [] },
  { id: 'other', label: 'Other', items: [] },
];
let sections = JSON.parse(JSON.stringify(defaultSections));
let checked = {};

function uid() { return '_' + Math.random().toString(36).substr(2, 9); }

function saveState() {
  localStorage.setItem('grocery_sections', JSON.stringify(sections));
  localStorage.setItem('grocery_checked', JSON.stringify(checked));
  localStorage.setItem('grocery_title', document.getElementById('tripTitle').textContent);
  localStorage.setItem('grocery_date', document.getElementById('tripDate').textContent);
  localStorage.setItem('grocery_notes', document.getElementById('notesInput').value);
}

function loadState() {
  const s = localStorage.getItem('grocery_sections');
  const c = localStorage.getItem('grocery_checked');
  const t = localStorage.getItem('grocery_title');
  const d = localStorage.getItem('grocery_date');
  const n = localStorage.getItem('grocery_notes');
  if (s) sections = JSON.parse(s);
  if (c) checked = JSON.parse(c);
  if (t) { document.getElementById('tripTitle').textContent = t; document.getElementById('titleInput').value = t; }
  if (d) { document.getElementById('tripDate').textContent = d; document.getElementById('dateInput').value = d; }
  if (n) document.getElementById('notesInput').value = n;
}

function populateQuickSection() {
  const sel = document.getElementById('quickSection');
  sel.innerHTML = '';
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.label;
    sel.appendChild(opt);
  });
}

function quickAdd() {
  const name = document.getElementById('quickName').value.trim();
  if (!name) return;
  const sectionId = document.getElementById('quickSection').value;
  const section = sections.find(s => s.id === sectionId);
  if (!section) return;
  section.items.push({ id: uid(), qty: '', name, note: '', recipe: '' });
  document.getElementById('quickName').value = '';
  saveState();
  render();
}

function render() {
  const container = document.getElementById('content');
  container.innerHTML = '';

  const totalItems = sections.reduce((sum, s) => sum + s.items.length, 0);

  if (totalItems === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-icon">🛒</div>
      <div class="empty-title">Your list is empty</div>
      <div class="empty-sub">Use the bar above to start adding items</div>
    `;
    container.appendChild(empty);
  }

  sections.forEach(section => {
    if (totalItems === 0 && section.items.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    const checkedInSection = section.items.filter(i => checked[i.id]).length;
    const countLabel = section.items.length > 0 ? `${checkedInSection}/${section.items.length}` : '';
    hdr.innerHTML = `
      <div class="section-left">
        <span class="section-label">${section.label}</span>
        <span class="section-count">${countLabel}</span>
        <button class="section-remove" onclick="removeSection('${section.id}')" title="Remove section">&times;</button>
      </div>
      <div class="section-actions">
        <button class="add-item-btn" onclick="toggleAddForm('${section.id}')">+ Add</button>
      </div>`;
    sec.appendChild(hdr);
    section.items.forEach((item, idx) => {
      if (!item.id) item.id = uid();
      const isChecked = !!checked[item.id];
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <div class="cb ${isChecked ? 'checked' : ''}" onclick="toggleCheck('${item.id}', this)"></div>
        <div class="item-body">
          <div class="item-main ${isChecked ? 'done' : ''}">${item.qty ? `<span class="item-qty">${item.qty}</span> ` : ''}${item.name}</div>
          ${item.note ? `<div class="item-meta">${item.note}</div>` : ''}
          ${item.recipe ? `<div class="item-recipe">${item.recipe}</div>` : ''}
        </div>
        <button class="delete-btn" onclick="deleteItem('${section.id}', ${idx})">&times;</button>
      `;
      sec.appendChild(row);
    });
    const form = document.createElement('div');
    form.className = 'add-form';
    form.id = `form-${section.id}`;
    form.innerHTML = `
      <div class="add-form-row">
        <input type="text" placeholder="Qty (optional)" id="qty-${section.id}">
        <input type="text" placeholder="Item name" id="name-${section.id}" style="flex:2">
      </div>
      <input type="text" placeholder="Note (optional)" id="note-${section.id}">
      <input type="text" placeholder="Recipe or tag (optional)" id="recipe-${section.id}">
      <div class="add-form-actions">
        <button class="btn-cancel" onclick="toggleAddForm('${section.id}')">Cancel</button>
        <button class="btn-add" onclick="addItem('${section.id}')">Add</button>
      </div>
    `;
    sec.appendChild(form);
    container.appendChild(sec);
  });

  // Add section bar
  const addBar = document.createElement('div');
  addBar.className = 'add-section-bar collapsed';
  addBar.id = 'addSectionBar';
  addBar.innerHTML = `
    <button class="add-section-btn" onclick="showAddSection()">+ Add section</button>
    <div class="add-section-form">
      <input type="text" id="newSectionName" placeholder="Section name (e.g. Snacks)">
      <button class="btn-add" onclick="addSection()">Add</button>
      <button class="btn-cancel" onclick="hideAddSection()">Cancel</button>
    </div>
  `;
  container.appendChild(addBar);
  populateQuickSection();
  updateProgress();
}

function showAddSection() {
  const bar = document.getElementById('addSectionBar');
  bar.classList.remove('collapsed');
  bar.querySelector('.add-section-btn').style.display = 'none';
  document.getElementById('newSectionName').focus();
}

function hideAddSection() {
  const bar = document.getElementById('addSectionBar');
  bar.classList.add('collapsed');
  bar.querySelector('.add-section-btn').style.display = '';
  document.getElementById('newSectionName').value = '';
}

function addSection() {
  const name = document.getElementById('newSectionName').value.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_') + '_' + uid();
  sections.push({ id, label: name, items: [] });
  saveState();
  render();
}

function removeSection(sectionId) {
  const section = sections.find(s => s.id === sectionId);
  if (!section) return;
  const count = section.items.length;
  const msg = count > 0
    ? `Remove "${section.label}" and its ${count} item${count > 1 ? 's' : ''}?`
    : `Remove empty section "${section.label}"?`;
  if (!confirm(msg)) return;
  section.items.forEach(item => { if (item.id) delete checked[item.id]; });
  sections = sections.filter(s => s.id !== sectionId);
  saveState();
  render();
}

function toggleCheck(itemId, el) {
  checked[itemId] = !checked[itemId];
  el.classList.toggle('checked', checked[itemId]);
  const main = el.parentElement.querySelector('.item-main');
  if (main) main.classList.toggle('done', checked[itemId]);
  saveState();
  updateProgress();
  // Update section count without full re-render
  const sectionEl = el.closest('.section');
  if (sectionEl) {
    const countEl = sectionEl.querySelector('.section-count');
    if (countEl) {
      const rows = sectionEl.querySelectorAll('.cb');
      const total = rows.length;
      const done = sectionEl.querySelectorAll('.cb.checked').length;
      countEl.textContent = `${done}/${total}`;
    }
  }
}

function deleteItem(sectionId, idx) {
  const section = sections.find(s => s.id === sectionId);
  if (!section) return;
  const item = section.items[idx];
  if (item && item.id) delete checked[item.id];
  section.items.splice(idx, 1);
  saveState();
  render();
}

function toggleAddForm(sectionId) {
  const form = document.getElementById(`form-${sectionId}`);
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    form.querySelector('input[id^="name-"]').focus();
  }
}

function addItem(sectionId) {
  const qty = document.getElementById(`qty-${sectionId}`).value.trim();
  const name = document.getElementById(`name-${sectionId}`).value.trim();
  const note = document.getElementById(`note-${sectionId}`).value.trim();
  const recipe = document.getElementById(`recipe-${sectionId}`).value.trim();
  if (!name) return;
  const section = sections.find(s => s.id === sectionId);
  if (!section) return;
  section.items.push({ id: uid(), qty: qty || '', name, note, recipe });
  saveState();
  render();
  const form = document.getElementById(`form-${sectionId}`);
  if (form) {
    form.classList.add('open');
    form.querySelector('input[id^="name-"]').focus();
  }
}

function resetAll() {
  if (!confirm('Uncheck all items?')) return;
  checked = {};
  saveState();
  render();
}

function newList() {
  if (!confirm('Start a brand new list? This will clear everything.')) return;
  sections = JSON.parse(JSON.stringify(defaultSections));
  checked = {};
  document.getElementById('tripTitle').textContent = 'Grocery List';
  document.getElementById('tripDate').textContent = '';
  document.getElementById('titleInput').value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('notesArea').classList.remove('open');
  document.getElementById('metaEdit').classList.remove('open');
  saveState();
  render();
}

function toggleNotes() {
  document.getElementById('notesArea').classList.toggle('open');
}

function toggleMeta() {
  const el = document.getElementById('metaEdit');
  el.classList.toggle('open');
  if (el.classList.contains('open')) document.getElementById('titleInput').focus();
}

function saveMeta() {
  const t = document.getElementById('titleInput').value.trim();
  const d = document.getElementById('dateInput').value.trim();
  document.getElementById('tripTitle').textContent = t || 'Grocery List';
  document.getElementById('tripDate').textContent = d;
  document.getElementById('metaEdit').classList.remove('open');
  saveState();
}

function updateProgress() {
  let total = 0;
  sections.forEach(s => total += s.items.length);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = total > 0
    ? `${done} of ${total} items checked`
    : 'No items yet';
}

// Enter key support for quick add
document.getElementById('quickName').addEventListener('keydown', e => {
  if (e.key === 'Enter') quickAdd();
});

document.getElementById('notesInput').addEventListener('input', saveState);
loadState();
render();
</script>
</body>
</html>
